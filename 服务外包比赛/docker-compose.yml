version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: fault_tree_postgres
    environment:
      POSTGRES_DB: fault_tree_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  neo4j:
    image: neo4j:4.4-community
    container_name: fault_tree_neo4j
    environment:
      NEO4J_AUTH: neo4j/Admin@123456
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fault_tree_backend
    depends_on:
      - postgres
      - neo4j
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_password
      - POSTGRES_DB=fault_tree_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=Admin@123456
      - DASHSCOPE_API_KEY=sk-3fbe5179260b441191d25418d49170c3
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fault_tree_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs: